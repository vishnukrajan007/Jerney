name: Jerney DevSecOps Pipeline

on:
  push:
    branches: ["*"]

permissions:
  contents: write

env:
  DOCKERHUB_USER: ${{ secrets.DOCKERHUB_USER }}
  DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}

jobs:

  # ==============================================================
  # 1. BUILD
  # ==============================================================
  build:
    runs-on: self-hosted

    strategy:
      matrix:
        component: [backend, frontend]

    steps:
      - uses: actions/checkout@v4

      - name: Build Image
        run: docker build -t ${{ matrix.component }}:latest ./${{ matrix.component }}

      - name: Save Image
        run: docker save ${{ matrix.component }}:latest -o ${{ matrix.component }}.tar

      - uses: actions/upload-artifact@v4
        with:
          name: image-${{ matrix.component }}
          path: ${{ matrix.component }}.tar


  # ==============================================================
  # 2. PUSH DOCKER
  # ==============================================================
  push:
    runs-on: self-hosted
    needs: build

    strategy:
      matrix:
        component: [backend, frontend]

    steps:
      - uses: actions/download-artifact@v4
        with:
          name: image-${{ matrix.component }}

      - run: docker load -i ${{ matrix.component }}.tar

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USER }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Tag & Push
        run: |
          docker tag ${{ matrix.component }}:latest \
          ${{ secrets.DOCKERHUB_USER }}/${{ matrix.component }}:${{ github.sha }}

          docker push ${{ secrets.DOCKERHUB_USER }}/${{ matrix.component }}:${{ github.sha }}


  # ==============================================================
  # 3. UPDATE CD REPO
  # ==============================================================
  update-manifest:
    name: 🚀 Update K8s Manifest
    runs-on: ubuntu-latest
    needs: push

    permissions:
      contents: write

    steps:
      # ==========================================================
      # 1. Checkout CD repo
      # ==========================================================
      - name: Checkout CD repo
        uses: actions/checkout@v4
        with:
          repository: vishnukrajan007/Jerney-cd
          token: ${{ secrets.CD_REPO_TOKEN }}
          path: cd-repo

      # ==========================================================
      # 2. Get full SHA
      # ==========================================================
      - name: Get SHA
        id: sha
        run: echo "sha=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      # ==========================================================
      # 3. Update manifest images
      # ==========================================================
      - name: Update image tags
        run: |
          IMAGE_TAG=${{ steps.sha.outputs.sha }}
          FILE="cd-repo/jerney-cd.yaml"

          echo "Updating images in $FILE with tag: $IMAGE_TAG"

          # Backend image update
          sed -i "s|image: .*jerney-backend.*|image: ${{ secrets.DOCKERHUB_USER }}/backend:${IMAGE_TAG}|" $FILE

          # Frontend image update
          sed -i "s|image: .*jerney-frontend.*|image: ${{ secrets.DOCKERHUB_USER }}/frontend:${IMAGE_TAG}|" $FILE

          echo "✅ Updated images:"
          grep "image:" $FILE

      # ==========================================================
      # 4. Commit & Push changes
      # ==========================================================
      - name: Commit & push
        run: |
          cd cd-repo

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add jerney-cd.yaml

          git diff --cached --quiet || git commit -m "update: image tag ${{ steps.sha.outputs.sha }} [skip ci]"

          git push https://x-access-token:${{ secrets.CD_REPO_TOKEN }}@github.com/vishnukrajan007/Jerney-cd.git
