name: Jerney DevSecOps Pipeline

on:
  push:
    branches: ["*"]

permissions:
  contents: write

env:
  DOCKERHUB_USER: ${{ secrets.DOCKERHUB_USER }}
  DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}

jobs:

# ==============================================================
# 1. BUILD
# ==============================================================
  build:
    runs-on: self-hosted

    strategy:
      matrix:
        component: [backend, frontend]

    steps:
      - uses: actions/checkout@v4

      - name: Build Image
        run: docker build -t ${{ matrix.component }}:latest ./${{ matrix.component }}

      - name: Save Image
        run: docker save ${{ matrix.component }}:latest -o ${{ matrix.component }}.tar

      - uses: actions/upload-artifact@v4
        with:
          name: image-${{ matrix.component }}
          path: ${{ matrix.component }}.tar


# ==============================================================
# 2. PUSH DOCKER
# ==============================================================
  push:
    runs-on: self-hosted
    needs: build

    strategy:
      matrix:
        component: [backend, frontend]

    steps:
      - uses: actions/download-artifact@v4
        with:
          name: image-${{ matrix.component }}

      - run: docker load -i ${{ matrix.component }}.tar

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USER }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Tag & Push
        run: |
          docker tag ${{ matrix.component }}:latest \
          ${{ secrets.DOCKERHUB_USER }}/${{ matrix.component }}:${{ github.sha }}

          docker push ${{ secrets.DOCKERHUB_USER }}/${{ matrix.component }}:${{ github.sha }}


# ==============================================================
# 3. UPDATE CD REPO
# ==============================================================
  update-manifest:
    name: "🚀 Update K8s Manifest"
    runs-on: ubuntu-latest
    needs: push

    permissions:
      contents: write

    steps:
      # ✅ Checkout CD repo
      - name: Checkout CD repo
        uses: actions/checkout@v4
        with:
          repository: vishnukrajan007/Jerney-cd
          token: ${{ secrets.CD_REPO_TOKEN }}
          path: Jerney-cd

      # ✅ Get short SHA
      - name: Get short SHA
        id: sha
        run: echo "short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      # ✅ Update YAML
      - name: Update K8s manifest
        run: |
          IMAGE_TAG=${{ steps.sha.outputs.short }}
          FILE="Jerney-cd/jerney.yaml"

          # Backend
          BACKEND_LINE=$(awk '/- name: backend/{found=1} found && /image:/{print NR; exit}' $FILE)
          sed -i "${BACKEND_LINE}s|.*|          image: ${DOCKERHUB_USER}/backend:${IMAGE_TAG}|" $FILE

          # Frontend
          FRONTEND_LINE=$(awk '/- name: frontend/{found=1} found && /image:/{print NR; exit}' $FILE)
          sed -i "${FRONTEND_LINE}s|.*|          image: ${DOCKERHUB_USER}/frontend:${IMAGE_TAG}|" $FILE

          echo "Updated images:"
          grep -n "image:" $FILE

      # ✅ Commit & Push
      - name: Commit and push
        run: |
          cd Jerney-cd
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add jerney.yaml
          git diff --cached --quiet || git commit -m "ci: update images to ${{ steps.sha.outputs.short }} [skip ci]"

          git push https://x-access-token:${{ secrets.CD_REPO_TOKEN }}@github.com/vishnukrajan007/Jerney-cd.git
