name: Jerney DevSecOps Pipeline

on:
  push:
    branches: ["*"]
  pull_request:
    branches: ["*"]

permissions:
  contents: read 

env:
  DOCKER_REGISTRY: docker.io
  DOCKERHUB_USER: ${{ secrets.DOCKERHUB_USER }}
  DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}

jobs:

# ==============================================================
# 1. LINT   
# ==============================================================
  lint:
    name: "🔍 Lint Code"
    runs-on: self-hosted

    strategy:
      matrix:
        component: [backend, frontend]

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        working-directory: ${{ matrix.component }}
        run: npm install

      - name: Run ESLint
        working-directory: ${{ matrix.component }}
        run: npm run lint


# ==============================================================
# 2. SCA
# ==============================================================
  sca:
    name: "🛡️ Dependency Scan"
    runs-on: self-hosted
    needs: lint

    strategy:
      matrix:
        component: [backend, frontend]

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        working-directory: ${{ matrix.component }}
        run: npm install

      - name: Run npm audit
        working-directory: ${{ matrix.component }}
        run: npm audit --audit-level=high || true


# ==============================================================
# 3. GITLEAKS
# ==============================================================
  gitleaks:
    name: "🔐 Secret Scan"
    runs-on: self-hosted
    needs: lint

    steps:
      - uses: actions/checkout@v4

      - name: Run Gitleaks
        uses: zricethezav/gitleaks-action@v2
        with:
          upload_sarif: false


# ==============================================================
# 4. TRIVY FS
# ==============================================================
  trivy-fs:
    name: "🔬 File Scan"
    runs-on: self-hosted
    needs: gitleaks

    steps:
      - uses: actions/checkout@v4

      - name: Install Trivy
        run: |
          sudo apt-get update
          curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sudo sh -s -- -b /usr/local/bin

      - name: Run Trivy FS
        run: trivy fs . --severity CRITICAL --exit-code 1


# ==============================================================
# 5. SONARQUBE
# ==============================================================
  sonarqube:
    name: "🔵 SonarQube Analysis"
    runs-on: self-hosted
    needs: trivy-fs

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        working-directory: backend
        run: npm install

      - name: Run SonarQube Scan
        run: |
          npx sonar-scanner \
            -Dsonar.projectKey=jerney \
            -Dsonar.sources=backend \
            -Dsonar.host.url=${{ secrets.SONAR_HOST_URL }} \
            -Dsonar.login=${{ secrets.SONAR_TOKEN }}


# ==============================================================
# 6. NEXUS
# ==============================================================
  nexus:
    name: "📦 Upload Artifact to Nexus"
    runs-on: self-hosted
    needs: sonarqube

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        working-directory: backend
        run: npm install

      - name: Create artifact
        run: zip -r app.zip backend

      - name: Upload to Nexus
        run: |
          curl -u ${{ secrets.NEXUS_USER }}:${{ secrets.NEXUS_PASS }} \
          --upload-file app.zip \
          http://43.205.126.242:8081/repository/my-artifacts-raw/app.zip


# ==============================================================
# 7. BUILD DOCKER IMAGES
# ==============================================================
  build:
    name: "🐳 Build Images"
    runs-on: self-hosted
    needs: nexus

    strategy:
      matrix:
        component: [backend, frontend]

    steps:
      - uses: actions/checkout@v4

      - name: Build Docker Image
        run: docker build -t ${{ matrix.component }}:latest ./${{ matrix.component }}

      - name: Save Image
        run: docker save ${{ matrix.component }}:latest -o ${{ matrix.component }}.tar

      - uses: actions/upload-artifact@v4
        with:
          name: image-${{ matrix.component }}
          path: ${{ matrix.component }}.tar


# ==============================================================
# 8. TRIVY IMAGE SCAN
# ==============================================================
  trivy-image:
    name: "🔬 Image Scan"
    runs-on: self-hosted
    needs: build

    strategy:
      matrix:
        component: [backend, frontend]

    steps:
      - uses: actions/download-artifact@v4
        with:
          name: image-${{ matrix.component }}

      - name: Load Image
        run: docker load -i ${{ matrix.component }}.tar

      - name: Install Trivy
        run: |
          sudo apt-get update
          curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sudo sh -s -- -b /usr/local/bin

      - name: Scan Image
        run: |
          trivy image ${{ matrix.component }}:latest \
            --severity CRITICAL --ignore-unfixed \
            --exit-code 1


# ==============================================================
# 9. PUSH TO DOCKER HUB
# ==============================================================
  push:
    name: "🚀 Push to Docker Hub"
    runs-on: self-hosted
    needs: trivy-image

    strategy:
      matrix:
        component: [backend, frontend]

    steps:
      - uses: actions/download-artifact@v4
        with:
          name: image-${{ matrix.component }}

      - name: Load Image
        run: docker load -i ${{ matrix.component }}.tar

      - name: Docker Login
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USER }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Tag & Push
        run: |
          docker tag ${{ matrix.component }}:latest \
            ${{ secrets.DOCKERHUB_USER }}/${{ matrix.component }}:latest

          docker push ${{ secrets.DOCKERHUB_USER }}/${{ matrix.component }}:latest
