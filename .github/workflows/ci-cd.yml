name: Jerney DevSecOps Pipeline

on:
  push:
    branches: ["*"]

permissions:
  contents: write

env:
  DOCKERHUB_USER: ${{ secrets.DOCKERHUB_USER }}
  DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}

jobs:

# ==============================================================
# 1. LINT
# ==============================================================
  lint:
    runs-on: self-hosted
    strategy:
      matrix:
        component: [backend, frontend]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - run: npm install
        working-directory: ${{ matrix.component }}

      - run: npm run lint
        working-directory: ${{ matrix.component }}

# ==============================================================
# 2. TRIVY FS
# ==============================================================
  trivy-fs:
    runs-on: self-hosted
    needs: lint

    steps:
      - uses: actions/checkout@v4

      - run: |
          sudo apt-get update
          curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sudo sh -s -- -b /usr/local/bin

      - run: trivy fs . --severity CRITICAL --exit-code 1

# ==============================================================
# 3. BUILD
# ==============================================================
  build:
    runs-on: self-hosted
    needs: trivy-fs

    strategy:
      matrix:
        component: [backend, frontend]

    steps:
      - uses: actions/checkout@v4

      - name: Build Image
        run: docker build -t ${{ matrix.component }}:latest ./${{ matrix.component }}

      - name: Save Image
        run: docker save ${{ matrix.component }}:latest -o ${{ matrix.component }}.tar

      - uses: actions/upload-artifact@v4
        with:
          name: image-${{ matrix.component }}
          path: ${{ matrix.component }}.tar

# ==============================================================
# 4. TRIVY IMAGE
# ==============================================================
  trivy-image:
    runs-on: self-hosted
    needs: build

    strategy:
      matrix:
        component: [backend, frontend]

    steps:
      - uses: actions/download-artifact@v4
        with:
          name: image-${{ matrix.component }}

      - run: docker load -i ${{ matrix.component }}.tar

      - run: |
          sudo apt-get update
          curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sudo sh -s -- -b /usr/local/bin

      - run: trivy image ${{ matrix.component }}:latest --severity CRITICAL --exit-code 1

# ==============================================================
# 5. PUSH DOCKER
# ==============================================================
  push:
    runs-on: self-hosted
    needs: trivy-image

    strategy:
      matrix:
        component: [backend, frontend]

    steps:
      - uses: actions/download-artifact@v4
        with:
          name: image-${{ matrix.component }}

      - run: docker load -i ${{ matrix.component }}.tar

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USER }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - run: |
          docker tag ${{ matrix.component }}:latest \
          ${{ secrets.DOCKERHUB_USER }}/${{ matrix.component }}:${{ github.sha }}

          docker push ${{ secrets.DOCKERHUB_USER }}/${{ matrix.component }}:${{ github.sha }}

# ==============================================================
# 6. UPDATE CD REPO (API METHOD)
# ==============================================================
  update-cd:
    runs-on: self-hosted
    needs: push

    steps:
      - name: Update CD repo without clone
        run: |
          FILE_PATH="jerney-cd.yaml"
          REPO="vishnukrajan007/Jerney-cd"
          BRANCH="main"

          # Get file
          RESPONSE=$(curl -s -H "Authorization: token ${{ secrets.CD_REPO_TOKEN }}" \
            https://api.github.com/repos/$REPO/contents/$FILE_PATH)

          SHA=$(echo "$RESPONSE" | grep '"sha"' | head -1 | cut -d '"' -f 4)
          CONTENT=$(echo "$RESPONSE" | grep '"content"' | cut -d '"' -f 4)

          # Decode
          DECODED=$(echo "$CONTENT" | base64 --decode)

          # Update frontend + backend images
          UPDATED=$(echo "$DECODED" | \
            sed "s|image: .*frontend.*|image: ${{ secrets.DOCKERHUB_USER }}/frontend:${{ github.sha }}|g" | \
            sed "s|image: .*backend.*|image: ${{ secrets.DOCKERHUB_USER }}/backend:${{ github.sha }}|g")

          # Encode
          ENCODED=$(echo "$UPDATED" | base64 | tr -d '\n')

          # Push update
          curl -X PUT \
            -H "Authorization: token ${{ secrets.CD_REPO_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d "{
              \"message\": \"Update images to ${{ github.sha }}\",
              \"content\": \"$ENCODED\",
              \"sha\": \"$SHA\",
              \"branch\": \"$BRANCH\"
            }" \
            https://api.github.com/repos/$REPO/contents/$FILE_PATH
